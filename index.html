<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정답을 입력하세요</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20cm;
            background: white;
            font-family: Arial, sans-serif;
            position: relative;
        }
        
        .a4-sheet {
            position: absolute;
            top: 2cm;
            left: 19.65cm;
            width: 10cm;
            height: 13cm;
            border: none;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        .a4-sheet .image-number {
            position: absolute;
            top: 0.3cm;
            left: 0.001cm;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 0.25rem 0.5rem;
            border-radius: 0.4rem;
            font-size: 0.9rem;
            z-index: 1;
        }

        .a4-sheet img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .a4-sheet .question-text {
            position: absolute;
            top: calc(100% + 1cm);
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            font-weight: bold;
            color: #222;
            white-space: nowrap;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .answer-row {
            display: flex;
            align-items: center;
            gap: 0.37cm;
        }

        .page-title {
            position: absolute;
            top: 3cm;
            left: 5cm;
            font-size: 45px;
            font-weight: bold;
        }
        
        input[type="text"] {
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 8px;
            width: 300px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        input[type="text"]:focus {
            border-color: #9bffd0;
            box-shadow: 0 0 10px rgba(156, 255, 217, 0.5);
            transform: scale(1.05);
        }

        .check-btn {
            padding: 15px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .check-btn:hover {
            background: #5567d3;
            transform: translateY(-1px);
        }

        .score-display {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
            color: #222;
            background: rgba(255, 255, 255, 0.95);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }
    </style>
</head>
<body>
    <h1 class="page-title">역사 영화 포스터 퀴즈</h1>
    <div class="a4-sheet">
        <div class="image-number">1</div>
        <img src="images/덩.jpg" alt="덩케르크 포스터">
        <div class="question-text">Q. 이 영화의 제목은 무엇일까요?</div>
    </div>
    <div class="container">
        <div class="answer-row">
            <input id="answerInput" type="text" placeholder="정답을 입력하세요...">
            <button id="checkButton" class="check-btn" type="button">확인</button>
        </div>
    </div>
    <div id="scoreDisplay" class="score-display">점수: 0/3</div>
    <script>
        const posters = [
            { src: 'images/덩.jpg', alt: '덩케르크 포스터', question: 'Q. 이 영화의 제목은 무엇일까요?', answer: '정답' },
            { src: 'images/사도.jpg', alt: '사도 포스터', question: 'Q. 이 영화의 감독은 누구일까요?', answer: '정답' },
            { src: 'images/광해.jpg', alt: '광해 포스터', question: 'Q. 이 영화의 주인공은 누구일까요?', answer: '정답' }
        ];
        let currentIndex = 0;
        let displayCount = 1;
        let score = 0;
        const totalQuestions = posters.length;
        const imageElement = document.querySelector('.a4-sheet img');
        const numberElement = document.querySelector('.a4-sheet .image-number');
        const questionElement = document.querySelector('.a4-sheet .question-text');
        const answerInput = document.getElementById('answerInput');
        const checkButton = document.getElementById('checkButton');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const remainingIndices = posters.map((_, index) => index).filter(index => index !== currentIndex);

        function showPoster(index) {
            imageElement.src = posters[index].src;
            imageElement.alt = posters[index].alt;
            numberElement.textContent = displayCount;
            questionElement.textContent = posters[index].question;
        }

        function updateScoreDisplay() {
            if (score >= totalQuestions) {
                scoreDisplay.textContent = '100점';
                scoreDisplay.style.display = 'block';
                imageElement.style.display = 'none';
                numberElement.style.display = 'none';
                questionElement.style.display = 'none';
            } else {
                scoreDisplay.style.display = 'none';
            }
        }

        function nextPoster() {
            if (remainingIndices.length === 0) return;
            const randomPos = Math.floor(Math.random() * remainingIndices.length);
            currentIndex = remainingIndices.splice(randomPos, 1)[0];
            displayCount += 1;
            showPoster(currentIndex);
        }

        function checkAnswer() {
            const currentPoster = posters[currentIndex];
            if (answerInput.value.trim() === currentPoster.answer) {
                score += 1;
                updateScoreDisplay();

                if (score >= totalQuestions) {
                    questionElement.textContent = '축하합니다! 100점';
                    answerInput.value = '';
                    answerInput.disabled = true;
                    checkButton.disabled = true;
                    return;
                }

                nextPoster();
                answerInput.value = '';
            }
        }

        answerInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                checkAnswer();
            }
        });

        checkButton.addEventListener('click', checkAnswer);
        answerInput.addEventListener('blur', checkAnswer);
        updateScoreDisplay();
    </script>
</body>
</html>
